name: Build Android APK

on:
  push:
    branches: [android-port]
  pull_request:
    branches: [android-port]
  workflow_dispatch:  # manual trigger

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # ── Install Qt for Android ──────────────────────────────────────
      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: android_arm64_v8a
          modules: 'qtcharts qtserialbus qtserialport qtbluetooth qtandroidextras'

      # ── Install Android SDK tools ───────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      # ── CMake configure ─────────────────────────────────────────────
      - name: CMake configure
        run: |
          cmake -B build_android -S android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=26 \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja \
            -DQT_HOST_PATH=$QT_ROOT_DIR/../gcc_64

      # ── Build ───────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build_android --target apk

      # ── Upload APK artifact ─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SavvyCAN-Android-APK
          path: build_android/android-build/*.apk
